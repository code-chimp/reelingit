services:
  postgres:
    image: postgres:17
    container_name: reelingit-local
    restart: unless-stopped
    environment:
      POSTGRES_DB: reelingit
      POSTGRES_USER: reelingit
      POSTGRES_PASSWORD: reelingit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
